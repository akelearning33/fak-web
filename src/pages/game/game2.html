<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เกมฝึกสมอง: นักบวกเลขคนเก่ง</title>
    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #fff3e0;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        #game-container {
            background-color: #ffffff;
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: row;
            width: 90vw;
            max-width: 1024px;
            height: 80vh;
            gap: 40px;
        }
        .left-panel {
            flex: 1.2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-right: 4px dashed #ffe0b2;
            padding-right: 20px;
        }
        .right-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding-left: 20px;
        }
        h1 { color: #d84315; font-size: 48px; margin-bottom: 5px; text-align: center;}
        
        #equation-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin: 40px 0;
            font-size: 90px;
            font-weight: bold;
            color: #37474f;
        }
        .number-box {
            background-color: #e1f5fe;
            border-radius: 25px;
            padding: 10px 30px;
            color: #0277bd;
            box-shadow: inset 0 4px 6px rgba(0,0,0,0.05);
        }
        .operator { color: #ef6c00; }
        
        input[type="text"] {
            font-size: 70px;
            width: 150px;
            text-align: center;
            border: 6px solid #4caf50;
            border-radius: 20px;
            padding: 10px;
            margin-bottom: 30px;
            color: #333333;
            background-color: #f1f8e9;
            font-weight: bold;
            pointer-events: none;
        }

        /* Numpad Styles */
        #numpad {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            gap: 20px;
        }
        .num-btn, .action-btn {
            font-size: 48px;
            font-weight: bold;
            border: none;
            height: 90px;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 8px 12px rgba(0,0,0,0.15);
            transition: transform 0.1s;
            touch-action: manipulation;
        }
        .num-btn { background-color: #ffb74d; color: white; }
        .num-btn:active { transform: scale(0.95); background-color: #f57c00; }
        
        .action-btn.clear { background-color: #e57373; color: white; font-size: 32px;}
        .action-btn.clear:active { background-color: #ef5350; transform: scale(0.95);}
        
        .action-btn.submit { background-color: #4CAF50; color: white; font-size: 32px;}
        .action-btn.submit:active { background-color: #43a047; transform: scale(0.95);}
        
        #feedback {
            font-size: 36px;
            margin-top: 20px;
            font-weight: bold;
            min-height: 50px;
            text-align: center;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div class="left-panel">
        <h1>นักบวกเลขคนเก่ง ➕</h1>
        <div id="equation-container">
            <div class="number-box" id="num1">?</div>
            <div class="operator">+</div>
            <div class="number-box" id="num2">?</div>
            <div class="operator">=</div>
        </div>
        <div id="feedback"></div>
    </div>
    
    <div class="right-panel">
        <input type="text" id="answer-input" placeholder="?" readonly>
        <div id="numpad">
            <button class="num-btn" onclick="inputNumber(1)">1</button>
            <button class="num-btn" onclick="inputNumber(2)">2</button>
            <button class="num-btn" onclick="inputNumber(3)">3</button>
            <button class="num-btn" onclick="inputNumber(4)">4</button>
            <button class="num-btn" onclick="inputNumber(5)">5</button>
            <button class="num-btn" onclick="inputNumber(6)">6</button>
            <button class="num-btn" onclick="inputNumber(7)">7</button>
            <button class="num-btn" onclick="inputNumber(8)">8</button>
            <button class="num-btn" onclick="inputNumber(9)">9</button>
            <button class="action-btn clear" onclick="clearNumber()">ลบ</button>
            <button class="num-btn" onclick="inputNumber(0)">0</button>
            <button class="action-btn submit" onclick="checkAnswer()">ตอบ!</button>
        </div>
    </div>
</div>

<script>
    let questionsPool = [];
    let currentCorrectAnswer = 0;

    function initializePool() {
        questionsPool = [];
        for (let i = 1; i <= 9; i++) {
            for (let j = 1; j <= 9; j++) {
                questionsPool.push({ a: i, b: j });
            }
        }
        for (let i = questionsPool.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [questionsPool[i], questionsPool[j]] = [questionsPool[j], questionsPool[i]];
        }
    }

    function generateQuestion() {
        document.getElementById('answer-input').value = '';
        document.getElementById('feedback').innerHTML = '';

        if (questionsPool.length === 0) {
            initializePool();
        }

        const currentQuestion = questionsPool.pop();
        document.getElementById('num1').innerText = currentQuestion.a;
        document.getElementById('num2').innerText = currentQuestion.b;
        
        currentCorrectAnswer = currentQuestion.a + currentQuestion.b;
    }

    function inputNumber(num) {
        const inputField = document.getElementById('answer-input');
        if (inputField.value.length < 2) {
            inputField.value += num;
        }
    }

    function clearNumber() {
        document.getElementById('answer-input').value = '';
    }

    function checkAnswer() {
        const userAnswer = parseInt(document.getElementById('answer-input').value);
        const feedback = document.getElementById('feedback');

        if (isNaN(userAnswer)) {
            feedback.style.color = '#ff9800';
            feedback.innerHTML = 'กดตัวเลขก่อนนะครับ';
            return;
        }

        if (userAnswer === currentCorrectAnswer) {
            feedback.style.color = '#4CAF50';
            feedback.innerHTML = 'เก่งมาก! 🌟 ยอดเยี่ยม';
            setTimeout(generateQuestion, 2000);
        } else {
            feedback.style.color = '#F44336';
            feedback.innerHTML = 'ลองบวกใหม่อีกครั้งนะ';
            clearNumber(); 
        }
    }

    window.onload = function() {
        initializePool();
        generateQuestion();
    };
</script>

</body>
</html>
